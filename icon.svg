<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b3fa0"/>
      <stop offset="100%" stop-color="#2a1a52"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3d55b"/>
      <stop offset="100%" stop-color="#d9ad2e"/>
    </linearGradient>
    <linearGradient id="bodyShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000022"/>
    </linearGradient>
    <radialGradient id="eye" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ff5a5a"/>
      <stop offset="100%" stop-color="#b3121f"/>
    </radialGradient>
    <linearGradient id="collar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a7a0"/>
      <stop offset="100%" stop-color="#d5645f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a8a8f"/>
      <stop offset="100%" stop-color="#57575c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- legs -->
  <g>
    <rect x="205" y="380" width="26" height="70" rx="13" fill="url(#body)"/>
    <rect x="281" y="380" width="26" height="70" rx="13" fill="url(#body)"/>
    <circle cx="218" cy="450" r="16" fill="#e0b93a"/>
    <circle cx="294" cy="450" r="16" fill="#e0b93a"/>
    <ellipse cx="214" cy="482" rx="30" ry="16" fill="url(#body)"/>
    <ellipse cx="298" cy="482" rx="30" ry="16" fill="url(#body)"/>
  </g>

  <!-- arms -->
  <g>
    <!-- left arm -->
    <circle cx="150" cy="300" r="28" fill="url(#collar)"/>
    <rect x="128" y="315" width="30" height="55" rx="15" fill="url(#metal)"/>
    <path d="M 110 375 a 22 22 0 1 0 44 6 a 30 30 0 0 1 -44 -6 Z" fill="#3a3a3f"/>
    <!-- right arm -->
    <circle cx="362" cy="300" r="28" fill="url(#collar)"/>
    <rect x="354" y="315" width="30" height="55" rx="15" fill="url(#metal)"/>
    <path d="M 402 375 a 22 22 0 1 1 -44 6 a 30 30 0 0 0 44 -6 Z" fill="#3a3a3f"/>
  </g>

  <!-- torso -->
  <path d="M 168 265 
           q -20 0 -20 40
           l 0 70
           q 0 45 40 45
           l 136 0
           q 40 0 40 -45
           l 0 -70
           q 0 -40 -20 -40
           Z" fill="url(#body)"/>
  <path d="M 168 265 
           q -20 0 -20 40
           l 0 70
           q 0 45 40 45
           l 136 0
           q 40 0 40 -45
           l 0 -70
           q 0 -40 -20 -40
           Z" fill="url(#bodyShade)"/>

  <!-- chest slats -->
  <rect x="212" y="330" rx="9" ry="9" width="16" height="60" fill="#fbf6ea"/>
  <rect x="240" y="330" rx="9" ry="9" width="16" height="60" fill="#fbf6ea"/>
  <rect x="268" y="330" rx="9" ry="9" width="16" height="60" fill="#fbf6ea"/>
  <rect x="296" y="330" rx="9" ry="9" width="16" height="60" fill="#fbf6ea"/>

  <!-- neck collar -->
  <ellipse cx="256" cy="262" rx="130" ry="34" fill="url(#collar)"/>
  <ellipse cx="256" cy="255" rx="112" ry="24" fill="url(#body)"/>

  <!-- ears -->
  <rect x="128" y="178" width="26" height="46" rx="10" fill="url(#metal)"/>
  <circle cx="141" cy="200" r="15" fill="url(#body)"/>
  <rect x="358" y="178" width="26" height="46" rx="10" fill="url(#metal)"/>
  <circle cx="371" cy="200" r="15" fill="url(#body)"/>

  <!-- head -->
  <path d="M 256 78
           q -95 0 -95 100
           l 0 70
           q 0 24 20 24
           l 150 0
           q 20 0 20 -24
           l 0 -70
           q 0 -100 -95 -100
           Z" fill="url(#body)"/>

  <!-- antenna -->
  <rect x="251" y="35" width="10" height="45" rx="5" fill="#8a8a8f"/>
  <circle cx="256" cy="30" r="14" fill="#3a3a3f"/>

  <!-- eyes -->
  <circle cx="215" cy="155" r="22" fill="url(#eye)"/>
  <circle cx="297" cy="155" r="22" fill="url(#eye)"/>

  <!-- mouth -->
  <path d="M 178 200 q 78 42 156 0 l 0 22 q -78 40 -156 0 Z" fill="#2b2b2f"/>
  <path d="M 190 205 
           l 18 14 l 16 -14 l 16 14 l 16 -14 l 16 14 l 16 -14 l 18 14
           l 0 8
           l -18 -12 l -16 12 l -16 -12 l -16 12 l -16 -12 l -16 12 l -18 -12 Z"
        fill="#f5f2ea"/>
</svg>
